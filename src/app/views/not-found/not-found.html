<main class="grid min-h-[calc(100vh-4rem)] place-items-center px-4 py-8">
  <section
    hlmCard
    class="w-full max-w-[34rem] border-brand-border bg-brand-surface text-center"
    aria-labelledby="not-found-title"
  >
    <div hlmCardHeader>
      <p hlmCardDescription>404</p>
      <h1 id="not-found-title" hlmCardTitle>Page not found</h1>
    </div>

    <div hlmCardContent class="text-brand-muted leading-[1.7]">
      <p>The page you are looking for does not exist.</p>
    </div>

    <div hlmCardFooter>
      <a hlmBtn routerLink="/discover" class="bg-brand-primary text-white">Return to Discover</a>
    </div>
  </section>
</main>
