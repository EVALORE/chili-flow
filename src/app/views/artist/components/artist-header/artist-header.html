@if (artist(); as artistData) {
  <div hlmCard class="w-full border-none bg-transparent shadow-none p-4">
    <div hlmCardContent class="flex flex-col sm:flex-row gap-6 items-center sm:items-end p-0">
      <div hlmAvatar class="w-40 h-40 rounded-lg shadow-xl border border-border">
        @if (artistData.image) {
          <img
            class="block h-full w-full object-cover"
            [src]="artistData.image"
            [alt]="artistData.name"
          />
        } @else {
          <span
            class="grid h-full w-full place-items-center bg-brand-border text-[clamp(2rem,34cqi,4.5rem)] leading-none font-extrabold text-foreground bg-[linear-gradient(135deg,color-mix(in_srgb,var(--color-brand-primary)_55%,transparent),transparent_58%)]"
            aria-hidden="true"
          >
          {{ artistData.name.charAt(0).toUpperCase() }}
        </span>
        }
      </div>

      <div class="flex flex-col space-y-1 text-center sm:text-left flex-1">
        <h1 class="text-3xl sm:text-5xl font-extrabold tracking-tight scroll-m-20 text-foreground">
          {{ artistData.name }}
        </h1>

        <div
          class="flex flex-wrap items-center justify-center sm:justify-start gap-2 pt-2 text-sm text-muted-foreground">
          @if (artistData.biography) {
            <span class="text-foreground">
              {{ artistData.biography }}
            </span>
            <span> Album count: {{ albumsAmount() }}</span>
          }
        </div>
      </div>
    </div>
  </div>
}
