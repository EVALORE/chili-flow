<section class="grid w-full gap-3" aria-label="Playlists">
  <div hlmTableContainer>
    <table hlmTable class="min-w-184 border-separate border-spacing-y-5">
      <caption hlmCaption class="sr-only">
        Custom collections with track counts, total playback duration.
      </caption>
      <thead hlmTableHeader>
        <tr hlmTableRow>
          <th hlmTableHead scope="col" class="text-xs uppercase text-brand-muted">Name</th>
          <th hlmTableHead scope="col" class="text-xs uppercase text-brand-muted">Track count</th>
          <th hlmTableHead class="w-26 text-right text-xs uppercase text-brand-muted" scope="col">
            <ng-icon hlm size="sm" name="lucideClock" aria-hidden="true" />
            <span class="sr-only">Duration</span>
          </th>
          <th hlmTableHead scope="col" class="text-xs uppercase text-brand-muted"></th>
        </tr>
      </thead>
      <tbody hlmTableBody>
        @if (loading()) {
          <tr hlmTableRow>
            <td hlmTableCell class="h-20 text-center text-brand-muted">Loading playlists...</td>
          </tr>
        } @else if (error()) {
          <tr hlmTableRow>
            <td hlmTableCell class="h-20 text-center text-destructive" role="alert">
              {{ error() }}
            </td>
          </tr>
        } @else if (playlists().length === 0) {
          <tr hlmTableRow>
            <td hlmTableCell class="h-20 text-center text-brand-muted" colspan="4">
              No playlists found.
            </td>
          </tr>
        } @else {
          @for (playlist of playlists(); track playlist.id) {
            <tr app-playlist-item [playlist]="playlist" (edit)="editPlaylist($event)"></tr>
          }
        }
      </tbody>
    </table>
  </div>

  <app-playlist-edit-dialog [playlist]="editingPlaylist()" (closed)="cancelEditPlaylist()" />
</section>
