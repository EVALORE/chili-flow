<td hlmTableCell class="flex min-w-72 items-center gap-3">
  <span
    class="inline-flex h-20 w-20 flex-none items-center justify-center rounded-sm bg-muted font-bold text-foreground uppercase"
    aria-hidden="true"
  >
    <ng-icon
      hlm
      size="xl"
      name="lucideMusic"
      color="var(--muted-foreground)"
      aria-hidden="true"
    />
  </span>
  <span class="grid min-w-0 gap-0.5">
    <span class="font-bold text-foreground" data-testid="track-title">
      {{ playlist().name }}
    </span>
    <span class="text-muted-foreground">User name</span>
  </span>
</td>
<td hlmTableCell class="w-26 text-center font-semibold text-muted-foreground tabular-nums">
  {{ playlist().trackCount }}
</td>
<td hlmTableCell class="w-26 text-right font-semibold text-muted-foreground tabular-nums">
  {{ playlist().totalDuration | duration }}
</td>
<td hlmTableCell class="w-26 text-right font-semibold text-muted-foreground tabular-nums">
  <button
    hlmBtn
    class="px-2"
    aria-label="Edit playlist {{ playlist().name }}"
    (click)="editPlaylist($event)"
  >
    <ng-icon hlm size="sm" name="lucidePencil" aria-hidden="true" />
  </button>
  <button
    hlmBtn
    class="px-2"
    aria-label="Delete playlist {{ playlist().name }}"
    (click)="deletePlaylist($event)"
  >
    <ng-icon hlm size="sm" name="lucideTrash2" aria-hidden="true" />
  </button>
</td>
