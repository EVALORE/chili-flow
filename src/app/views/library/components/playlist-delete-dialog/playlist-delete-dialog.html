<hlm-dialog [state]="state()" (closed)="closed.emit()">
  @if (playlist()) {
    <hlm-dialog-content class="sm:max-w-[425px] border-0" *hlmDialogPortal="let ctx">
      <hlm-dialog-header>
        <h3 hlmDialogTitle>Delete Playlist</h3>
        <p hlmDialogDescription>
          Are you sure you want to delete this playlist? This action cannot be undone.
        </p>
      </hlm-dialog-header>

      <hlm-dialog-footer>
        <button hlmBtn class="bg-brand-border rounded-full" (click)="deletePlaylist(ctx)">
          Delete
        </button>
      </hlm-dialog-footer>
    </hlm-dialog-content>
  }
</hlm-dialog>
