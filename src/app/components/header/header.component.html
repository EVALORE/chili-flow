<header class="flex items-center justify-between h-16 w-full px-4">
  <div class="flex items-center overflow-hidden gap-2">
    <img src="chiliflow_logo.png" alt="chiliflow_logo" class="h-10 w-auto" />
    <span class="font-semibold">{{ appTitle }}</span>
  </div>

  <div class="flex items-center rounded-full px-2 gap-2">
    <button hlmBtn variant="outline" class="bg-brand-surface rounded-full gap-2 border-0">
      <svg lucideHouse />
    </button>
    <input hlmInput id="search-input" type="text" placeholder="Search"
           class="border-0 bg-brand-surface rounded-full outline-none shadow-none flex-1 min-w-64" />
  </div>

  <button hlmBtn variant="outline" class="bg-brand-surface rounded-full border-0">
    <svg lucideCircleUserRound></svg>
    <span class="font-semibold">Sign In</span>
  </button>

</header>
