@if (loading()) {
  <article class="grid w-full min-w-0 max-w-56 gap-3">
    <div
      class="aspect-square w-full min-w-0 animate-pulse overflow-hidden rounded-md bg-linear-to-r from-brand-border via-white/20 to-brand-border"
    ></div>
    <div class="grid min-w-0 gap-1">
      <span
        class="block h-3.5 w-[82%] animate-pulse rounded-full bg-linear-to-r from-brand-border via-white/20 to-brand-border"
      ></span>
      <span
        class="block h-3.5 w-[58%] animate-pulse rounded-full bg-linear-to-r from-brand-border via-white/20 to-brand-border"
      ></span>
    </div>
  </article>
} @else if (artist(); as artistCardData) {
  <a
    class="grid w-full min-w-0 max-w-56 cursor-pointer gap-3 rounded-lg border border-transparent p-3 text-foreground no-underline transition-[background-color,border-color,transform] duration-150 ease-out hover:-translate-y-px hover:border-brand-border hover:bg-brand-surface focus-visible:outline-2 focus-visible:outline-offset-[3px] focus-visible:outline-ring"
    [routerLink]="['/artist', artistCardData.id]"
    [attr.aria-label]="'Open artist ' + artistCardData.name"
  >
    <span class="aspect-square w-full min-w-0 overflow-hidden rounded-md bg-brand-border">
      @if (artistCardData.image) {
        <img
          class="block h-full w-full object-cover"
          [src]="artistCardData.image"
          [alt]="artistCardData.name"
        />
      } @else {
        <span
          class="grid h-full w-full place-items-center bg-brand-border text-[clamp(2rem,34cqi,4.5rem)] leading-none font-extrabold text-foreground bg-[linear-gradient(135deg,color-mix(in_srgb,var(--color-brand-primary)_55%,transparent),transparent_58%)]"
          aria-hidden="true"
        >
          {{ artistCardData.name.charAt(0).toUpperCase() }}
        </span>
      }
    </span>

    <span class="grid min-w-0 gap-1">
      <span
        class="min-w-0 overflow-hidden text-ellipsis whitespace-nowrap text-[0.9375rem] leading-[1.35] font-extrabold text-foreground"
      >
        {{ artistCardData.name }}
      </span>
    </span>
  </a>
}
